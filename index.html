<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFA L1 题库</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pri:#1a365d;--pri2:#2a4a7f;--acc:#c9a227;--acc2:#e6c85a;
  --ok:#276749;--ok-bg:#f0fff4;--err:#9b2335;--err-bg:#fff5f5;
  --bg:#f7f8fc;--card:#fff;--bd:#e2e8f0;--tx:#2d3748;--tx2:#718096;
  --r:10px;--sh:0 2px 8px rgba(0,0,0,.08);--sh2:0 8px 32px rgba(0,0,0,.13)
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;
  background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column}

/* Header */
.hd{background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff;
  padding:16px 28px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:var(--sh2);gap:12px;flex-wrap:wrap}
.hd-logo{display:flex;align-items:center;gap:10px}
.hd-title{font-size:1.25rem;font-weight:700}
.hd-sub{font-size:.75rem;opacity:.7}
.hd-nav{display:flex;gap:8px}
.hd-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:#fff;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:.82rem;transition:.2s}
.hd-btn:hover{background:rgba(255,255,255,.28)}
.sync-dot{font-size:.65rem;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.04em;transition:.3s;white-space:nowrap;display:none}
.sync-dot.show{display:inline-block}
/* Data modal */
.data-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;align-items:center;justify-content:center}
.data-modal.on{display:flex}
.data-box{background:#fff;border-radius:var(--r);padding:24px;max-width:400px;width:92%;box-shadow:var(--sh2)}
.data-box-t{font-size:1.05rem;font-weight:700;margin-bottom:6px;color:var(--pri)}
.data-box-sub{font-size:.8rem;color:var(--tx2);margin-bottom:18px}
.data-act{display:grid;gap:10px}
.data-btn{width:100%;padding:11px;border-radius:8px;border:none;cursor:pointer;font-size:.88rem;font-weight:600;text-align:left;transition:.2s}
.data-btn-exp{background:#ebf8ff;color:#2b6cb0}.data-btn-exp:hover{background:#bee3f8}
.data-btn-imp{background:#f0fff4;color:#276749}.data-btn-imp:hover{background:#c6f6d5}
.data-btn-sync{background:#fffbeb;color:#b7791f}.data-btn-sync:hover{background:#fef3c7}
.data-btn-pull{background:#f5f3ff;color:#553c9a}.data-btn-pull:hover{background:#e9d8fd}
.data-btn-clean{background:#fff5f5;color:#c53030}.data-btn-clean:hover{background:#fed7d7}
.data-btn-close{background:#f7f8fc;color:var(--tx2);margin-top:4px}.data-btn-close:hover{background:#edf2f7}
.data-hint{font-size:.75rem;color:var(--tx2);margin-top:14px;padding:10px;background:#f7f8fc;border-radius:6px;line-height:1.5}
.sync-dot.synced{background:rgba(255,255,255,.2);color:#fff}
.sync-dot.syncing{background:rgba(255,220,80,.35);color:#fff}
.sync-dot.err{background:rgba(255,100,100,.3);color:#fff}
.hd-btn.on{background:var(--acc);border-color:var(--acc);color:var(--pri);font-weight:700}

/* Layout */
.wrap{max-width:1100px;margin:0 auto;padding:22px 18px;flex:1}
.view{display:none}.view.on{display:block}

/* HOME */
.pg-title{font-size:1.5rem;font-weight:700;color:var(--pri);text-align:center;margin-bottom:6px}
.pg-sub{text-align:center;color:var(--tx2);font-size:.9rem;margin-bottom:28px}
.subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:28px}
.sc{background:var(--card);border:2px solid var(--bd);border-radius:var(--r);
  padding:20px;transition:all .18s;position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--pri),var(--acc));transform:scaleX(0);transition:.2s}
.sc:hover{border-color:var(--pri);box-shadow:var(--sh2);transform:translateY(-2px)}
.sc:hover::after{transform:scaleX(1)}
.sc-icon{font-size:1.8rem;margin-bottom:10px}
.sc-name{font-size:1.05rem;font-weight:700;color:var(--pri);margin-bottom:6px}
.sc-meta{font-size:.8rem;color:var(--tx2);display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.pbar{height:5px;background:#edf2f7;border-radius:99px;margin-bottom:14px}
.pbar-fill{height:5px;border-radius:99px;background:linear-gradient(90deg,var(--pri),var(--acc));transition:.4s}
.sc-btns{display:flex;gap:8px}
.sc-btn{flex:1;padding:8px 4px;border:none;border-radius:7px;font-size:.82rem;font-weight:600;cursor:pointer;transition:.15s}
.sc-btn-p{background:var(--pri);color:#fff}
.sc-btn-p:hover{background:var(--pri2)}
.sc-btn-w{background:var(--err-bg);color:var(--err);border:1px solid #feb2b2}
.sc-btn-w:hover{background:#fed7d7}
.all-btn{display:block;width:100%;
  padding:15px;background:linear-gradient(135deg,var(--pri),var(--pri2));
  color:#fff;border:none;border-radius:var(--r);font-size:1rem;font-weight:600;
  cursor:pointer;box-shadow:var(--sh);transition:.2s}
.all-btn:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.mix-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px}
.all-btn-g1{background:linear-gradient(135deg,#276749,#38a169)!important}
.all-btn-g2{background:linear-gradient(135deg,#553c9a,#805ad5)!important}

/* QUIZ */
.qh{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);
  padding:14px 20px;margin-bottom:18px;display:flex;align-items:center;
  justify-content:space-between;flex-wrap:wrap;gap:10px}
.qtag{background:var(--pri);color:#fff;padding:4px 13px;border-radius:99px;font-size:.8rem;font-weight:600}
.qpbar{flex:1;min-width:100px;height:8px;background:#edf2f7;border-radius:99px}
.qpbar-fill{height:8px;border-radius:99px;background:linear-gradient(90deg,var(--pri),var(--acc));transition:.3s}
.qinfo{font-size:.88rem;color:var(--tx2)}
.qcard{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:28px;margin-bottom:18px;box-shadow:var(--sh)}
.qnum{color:var(--acc);font-weight:700;font-size:.92rem;margin-bottom:10px}
.qtext{font-size:1.12rem;line-height:1.85;margin-bottom:24px;white-space:pre-wrap;word-break:break-word}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;align-items:flex-start;gap:13px;padding:14px 18px;
  border:2px solid var(--bd);border-radius:8px;background:#fff;cursor:pointer;
  text-align:left;font-size:1.05rem;line-height:1.7;transition:all .15s;width:100%;
  white-space:normal}
.opt>span:last-child{flex:1;min-width:0;word-break:break-word}
.opt:hover:not(:disabled){border-color:var(--pri);background:#f0f4ff}
.opt-l{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--bd);
  color:var(--tx);display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.82rem;transition:.15s}
.opt.sel .opt-l{background:var(--pri);color:#fff}
.opt.ok{border-color:var(--ok);background:var(--ok-bg)}
.opt.ok .opt-l{background:var(--ok);color:#fff}
.opt.ng{border-color:var(--err);background:var(--err-bg)}
.opt.ng .opt-l{background:var(--err);color:#fff}
.opt:disabled{cursor:default}
.expl{margin-top:18px;border-radius:var(--r);border:1px solid var(--bd);overflow:hidden;display:none}
.expl-hd{padding:12px 18px;font-weight:600;font-size:1rem;display:flex;align-items:center;gap:7px}
.expl-hd.ok{background:var(--ok-bg);color:var(--ok)}
.expl-hd.ng{background:var(--err-bg);color:var(--err)}
.expl-bd{padding:16px 18px;font-size:1rem;line-height:1.82;background:#fff;white-space:pre-wrap;word-break:break-word}
.qa{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.bg{display:flex;gap:9px;flex-wrap:wrap}
.btn{padding:9px 20px;border-radius:7px;border:none;font-size:.88rem;font-weight:600;cursor:pointer;transition:.18s}
.btn-p{background:var(--pri);color:#fff}.btn-p:hover{background:var(--pri2)}
.btn-s{background:#fff;color:var(--pri);border:2px solid var(--pri)}.btn-s:hover{background:#f0f4ff}
.btn-a{background:var(--acc);color:var(--pri)}.btn-a:hover{background:var(--acc2)}
.btn-e{background:var(--err);color:#fff}.btn-e:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}
.jmp{display:flex;align-items:center;gap:7px}
.jmp-in{width:68px;padding:7px 9px;border:2px solid var(--bd);border-radius:6px;font-size:.88rem;text-align:center}
.jmp-in:focus{outline:none;border-color:var(--pri)}

/* WRONG */
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.section-title{font-size:1.2rem;font-weight:700;color:var(--pri)}
.tag-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.ftag{padding:5px 14px;border:2px solid var(--bd);border-radius:99px;background:#fff;
  cursor:pointer;font-size:.8rem;font-weight:600;color:var(--tx);transition:.15s}
.ftag.on{border-color:var(--pri);background:var(--pri);color:#fff}
.filter-group{margin-bottom:4px}
.filter-label{font-size:.72rem;font-weight:700;color:var(--tx2);letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:6px}
.wlist{display:flex;flex-direction:column;gap:14px}
.wi{background:var(--card);border:1px solid var(--bd);border-left:4px solid var(--err);
  border-radius:var(--r);padding:18px 22px;cursor:pointer;transition:box-shadow .2s}
.wi:hover{box-shadow:var(--sh2)}
.wi-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;flex-wrap:wrap;gap:7px}
.wi-meta{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.tag{padding:2px 9px;border-radius:99px;font-size:.73rem;font-weight:600}
.tag-s{background:#ebf4ff;color:var(--pri)}
.tag-w{background:var(--err-bg);color:var(--err)}
.wi-q{font-size:.92rem;line-height:1.6;color:var(--tx);margin-bottom:8px}
.wi-ans{font-size:.8rem;color:var(--tx2)}
.wi-act{display:flex;gap:7px;margin-top:10px}
.bsm{padding:5px 11px;border-radius:5px;border:none;font-size:.76rem;font-weight:600;cursor:pointer;transition:.15s}
.bsm-p{background:var(--pri);color:#fff}
.bsm-d{background:#fed7d7;color:var(--err)}
.bsm:hover{opacity:.85}
.empty{text-align:center;padding:52px 20px;color:var(--tx2)}
.empty-i{font-size:2.8rem;margin-bottom:10px}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:22px}
.stat-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:22px;text-align:center}
.stat-n{font-size:2rem;font-weight:800;color:var(--pri)}
.stat-l{font-size:.82rem;color:var(--tx2);margin-top:4px}
.tbl{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.tbl table{width:100%;border-collapse:collapse}
.tbl th{background:var(--pri);color:#fff;padding:11px 18px;text-align:left;font-size:.82rem}
.tbl td{padding:11px 18px;border-bottom:1px solid var(--bd);font-size:.88rem}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:nth-child(even) td{background:#f7f8fc}
.acc-bar{display:flex;align-items:center;gap:9px}
.acc-bg{flex:1;height:7px;background:#edf2f7;border-radius:99px}
.acc-fill{height:7px;border-radius:99px;background:linear-gradient(90deg,var(--pri),var(--acc))}

/* Toast */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(60px);
  background:#1a202c;color:#fff;padding:11px 22px;border-radius:8px;font-size:.86rem;
  opacity:0;transition:.3s;z-index:9999;pointer-events:none}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1}

/* HW (课后题) */
.hw-mix-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px}
.hw-all-btn{display:block;width:100%;padding:15px;color:#fff;border:none;border-radius:var(--r);
  font-size:1rem;font-weight:600;cursor:pointer;box-shadow:var(--sh);transition:.2s}
.hw-all-btn:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.hw-all-btn-all{background:linear-gradient(135deg,var(--pri),var(--pri2))}
.hw-all-btn-g1{background:linear-gradient(135deg,#276749,#38a169)}
.hw-all-btn-g2{background:linear-gradient(135deg,#553c9a,#805ad5)}
.hw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.hw-card{background:var(--card);border:2px solid var(--bd);border-radius:var(--r);
  padding:18px;transition:all .18s;cursor:pointer;position:relative;overflow:hidden}
.hw-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--err),#fc8181);transform:scaleX(0);transition:.2s}
.hw-card:hover{border-color:var(--err);box-shadow:var(--sh2);transform:translateY(-2px)}
.hw-card:hover::after{transform:scaleX(1)}
.hw-card-subj{font-weight:700;font-size:1rem;color:var(--pri);margin-bottom:4px}
.hw-card-mod{font-size:.78rem;color:var(--tx2);margin-bottom:10px}
.hw-card-cnt{font-size:1.3rem;font-weight:800;color:var(--err)}
.hw-card-lbl{font-size:.75rem;color:var(--tx2);margin-top:2px}
.hw-no-data{text-align:center;padding:52px 20px;color:var(--tx2);grid-column:1/-1}
@media(max-width:600px){.hw-mix-btns{grid-template-columns:1fr}}

/* JC 百题库 */
.jc-mix-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.jc-subj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:28px}
.jc-wrong-bar{display:flex;align-items:center;gap:12px;margin-bottom:22px;
  background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:14px 20px}
.jc-wrong-bar-info{font-size:.92rem;color:var(--tx2);flex:1}
.jc-wrong-bar-info strong{color:var(--err)}
@media(max-width:600px){.jc-mix-btns{grid-template-columns:1fr}}

/* Subject modal */
.subj-sel{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;
  align-items:center;justify-content:center}
.subj-sel.on{display:flex}
.subj-box{background:#fff;border-radius:var(--r);padding:24px;max-width:420px;width:90%;box-shadow:var(--sh2)}
.subj-box-t{font-size:1.05rem;font-weight:700;margin-bottom:16px;color:var(--pri)}
.mode-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.mbt{padding:12px 16px;border:2px solid var(--bd);border-radius:8px;background:#fff;
  cursor:pointer;text-align:left;font-size:.92rem;transition:.15s;width:100%}
.mbt:hover,.mbt.on{border-color:var(--pri);background:#f0f4ff}
.mbt-title{font-weight:700;color:var(--pri)}
.mbt-desc{font-size:.78rem;color:var(--tx2);margin-top:3px}
.range-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.range-row label{font-size:.85rem;color:var(--tx);white-space:nowrap}
.range-in{width:80px;padding:7px;border:2px solid var(--bd);border-radius:6px;font-size:.88rem;text-align:center}
.range-in:focus{outline:none;border-color:var(--pri)}

@media(max-width:600px){
  .hd{padding:12px 14px}
  .wrap{padding:14px 10px}
  .qcard{padding:18px 14px}
  .qa{flex-direction:column}
  .bg{width:100%;justify-content:center}
  .mix-btns{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-logo">
    <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
      <rect width="34" height="34" rx="8" fill="rgba(255,255,255,.15)"/>
      <path d="M7 25L17 9l10 16H7z" fill="#c9a227" opacity=".9"/>
      <circle cx="17" cy="19" r="3.5" fill="white" opacity=".9"/>
    </svg>
    <div>
      <div class="hd-title">CFA L1 题库</div>
      <div class="hd-sub">付费 1000 题 · 分科练习</div>
    </div>
  </div>
  <div class="hd-nav">
    <span class="sync-dot" id="sync-dot"></span>
    <button class="hd-btn on" id="nav-home" onclick="showView('home')">PACK题</button>
    <button class="hd-btn" id="nav-hw" onclick="showView('hw')">&#128218; 课后题</button>
    <button class="hd-btn" id="nav-jc" onclick="showView('jc')">&#127381; JC百题</button>
    <button class="hd-btn" id="nav-wrong" onclick="showView('wrong')">&#128213; 错题库</button>
    <button class="hd-btn" id="nav-stats" onclick="showView('stats')">&#128202; 统计</button>
    <button class="hd-btn" onclick="showDataModal()" title="数据备份与同步">&#9881;</button>
  </div>
</div>

<div class="wrap">

  <!-- HOME -->
  <div class="view on" id="view-home">
    <div class="pg-title">选择练习科目</div>
    <div class="pg-sub">共 989 题 · 全部含解析 · 错题自动收录</div>
    <div class="mix-btns">
      <button class="all-btn" onclick="openSubjSel('all')">&#9654; 全部科目混合练习（989题）</button>
      <button class="all-btn all-btn-g1" onclick="openSubjSel('group1')">&#9654; 数量·经济·财报·公司金融（混合）</button>
      <button class="all-btn all-btn-g2" onclick="openSubjSel('group2')">&#9654; 权益·固收·衍生·另类·组合（混合）</button>
    </div>
    <div class="subject-grid" id="subject-grid"></div>
  </div>

  <!-- QUIZ -->
  <div class="view" id="view-quiz">
    <div class="qh">
      <span class="qtag" id="q-tag">科目</span>
      <div class="qpbar"><div class="qpbar-fill" id="q-pbar" style="width:0%"></div></div>
      <span class="qinfo" id="q-info">0/0</span>
    </div>
    <div class="qcard">
      <div class="qnum" id="q-num">第 1 题</div>
      <div class="qtext" id="q-text"></div>
      <div class="opts" id="q-opts"></div>
      <div class="expl" id="q-expl">
        <div class="expl-hd" id="q-expl-hd"></div>
        <div class="expl-bd" id="q-expl-bd"></div>
      </div>
    </div>
    <div class="qa">
      <div class="bg">
        <button class="btn btn-s" onclick="prevQ()">&#8592; 上一题</button>
        <button class="btn btn-p" id="btn-next" onclick="nextQ()">下一题 &#8594;</button>
        <button class="btn btn-a" id="btn-wrong" onclick="toggleWrong()" style="display:none">加入错题</button>
      </div>
      <div class="bg">
        <div class="jmp">
          <input class="jmp-in" id="jmp-in" type="number" placeholder="题号" min="1">
          <button class="btn btn-s" onclick="jumpQ()">跳转</button>
        </div>
        <button class="btn btn-s" onclick="showView('home')">退出</button>
      </div>
    </div>
  </div>

  <!-- WRONG -->
  <div class="view" id="view-wrong">
    <div class="section-hd">
      <div>
        <div class="section-title">错题库</div>
        <div style="color:var(--tx2);font-size:.88rem;margin-top:4px" id="wrong-stats">共 0 题</div>
      </div>
      <div class="bg">
        <button class="btn btn-s" onclick="exportWrong()">导出 TXT</button>
        <button class="btn btn-p" onclick="practiceWrong()">练习错题</button>
      </div>
    </div>
    <div class="filter-group">
      <span class="filter-label">来源</span>
      <div class="tag-row" id="wrong-filter-src"></div>
    </div>
    <div class="filter-group">
      <span class="filter-label">科目</span>
      <div class="tag-row" id="wrong-filter-subj"></div>
    </div>
    <div class="wlist" id="wrong-list"></div>
  </div>

  <!-- HW 课后题 -->
  <div class="view" id="view-hw">
    <div class="pg-title">CFA 课后题</div>
    <div class="pg-sub" id="hw-pg-sub">来自 CFA Institute 平台的错题 · 重新练习巩固</div>
    <div class="hw-mix-btns">
      <button class="hw-all-btn hw-all-btn-all" onclick="openHwSel('all')">&#9654; 全部课后错题</button>
      <button class="hw-all-btn hw-all-btn-g1" onclick="openHwSel('g1')">&#9654; 数量·经济·财报·公司金融（混合）</button>

<script>
var QUESTIONS = (typeof CFA_QUESTIONS !== 'undefined') ? CFA_QUESTIONS : [];
var HW_QUESTIONS = (typeof CFA_HW_QUESTIONS !== 'undefined') ? CFA_HW_QUESTIONS : [];
var JC_QUESTIONS = (typeof window.JC_QUESTIONS !== 'undefined') ? window.JC_QUESTIONS : [];
var ICONS = {'财务报表':'📊','公司发行人':'🏢','股权投资':'📈','固定收益':'💳','经济学':'📚','另类投资':'🔄','数量分析':'🔢','衍生品':'⚙️','职业道德':'⚖️','组合管理':'🗂️'};
var GROUP_SETS = {
  'group1': ['数量分析','经济学','财务报表','公司发行人'],
  'group2': ['股权投资','固定收益','衍生品','另类投资','组合管理']
};
var GROUP_LABELS = {
  'group1': '数量·经济·财报·公司金融',
  'group2': '权益·固收·衍生·另类·组合'
};
var SUBJECTS = [];
(function(){
  var seen = {};
  QUESTIONS.forEach(function(q){ if(!seen[q.subject]){ seen[q.subject]=1; SUBJECTS.push(q.subject); } });
})();

// Storage
var DB_KEY = 'cfa_l1';
var JC_DB_KEY = 'jc_l1';
var HW_DB_KEY = 'hw_l1';
function getDb(ns){
  var k = ns==='jc' ? JC_DB_KEY : ns==='hw' ? HW_DB_KEY : DB_KEY;
  var d; try{ d=JSON.parse(localStorage.getItem(k)||'{}'); }catch(e){ d={}; }
  if(!d.history) d.history={};
  if(!d.wrong) d.wrong={};
  return d;
}
function saveDb(d, ns, noPush){
  var k = ns==='jc' ? JC_DB_KEY : ns==='hw' ? HW_DB_KEY : DB_KEY;
  localStorage.setItem(k, JSON.stringify(d));
  if(!noPush) pushSync();
}

// State
var S = { view:'home', quiz:{qs:[],idx:0,ans:{},subject:null,isJc:false,isHw:false}, wrongSrc:'all', wrongSubj:'all', selSubject:null, selMode:'seq', statsType:'pack' };

// View
function showView(v){
  document.querySelectorAll('.view').forEach(function(el){ el.classList.remove('on'); });
  document.getElementById('view-'+v).classList.add('on');
  document.querySelectorAll('.hd-btn').forEach(function(el){ el.classList.remove('on'); });
  var nb = document.getElementById('nav-'+v);
  if(nb) nb.classList.add('on');
  S.view = v;
  if(v==='home') renderHome();
  if(v==='wrong') renderWrong();
  if(v==='stats') renderStats();
  if(v==='hw') renderHw();
  if(v==='jc') renderJc();
}

// Home
function renderHome(){
  var d = getDb();
  var html = SUBJECTS.map(function(subj){
    var qs = QUESTIONS.filter(function(q){ return q.subject===subj; });
    var done = qs.filter(function(q){ return d.history[subj+'_'+q.num]; }).length;
    var ok = qs.filter(function(q){ var h=d.history[subj+'_'+q.num]; return h&&h.ok; }).length;
    var wCount = qs.filter(function(q){ var w=d.wrong[subj+'_'+q.num]; return w&&w.on; }).length;
    var pct = qs.length ? Math.round(done/qs.length*100) : 0;
    var acc = done ? Math.round(ok/done*100) : 0;
    var icon = ICONS[subj]||'📝';
    var wBtn = wCount ? '<button class="sc-btn sc-btn-w" onclick="startWrongSubj(\''+subj+'\');event.stopPropagation()">错题('+wCount+')</button>' : '';
    return '<div class="sc">'
      +'<div class="sc-icon">'+icon+'</div>'
      +'<div class="sc-name">'+subj+'</div>'
      +'<div class="sc-meta">'
        +'<span>'+qs.length+' 题</span>'
        +'<span>已做 '+done+'</span>'
        +(done?'<span>正确率 '+acc+'%</span>':'')
        +(wCount?'<span style="color:var(--err)">错题 '+wCount+'</span>':'')
      +'</div>'
      +'<div class="pbar"><div class="pbar-fill" style="width:'+pct+'%"></div></div>'
      +'<div class="sc-btns">'
        +'<button class="sc-btn sc-btn-p" onclick="openSubjSel(\''+subj+'\')">开始练习</button>'
        +wBtn
      +'</div>'
    +'</div>';
  }).join('');
  document.getElementById('subject-grid').innerHTML = html;
}

// Subject select modal
var _pSubj = null;
function openSubjSel(subj){
  _pSubj = subj;
  S.selMode = 'seq';
  var d = getDb();
  var isAll = subj==='all';
  var isGroup = GROUP_SETS[subj] != null;
  var qs = isAll ? QUESTIONS
    : isGroup ? QUESTIONS.filter(function(q){ return GROUP_SETS[subj].indexOf(q.subject)>=0; })
    : QUESTIONS.filter(function(q){ return q.subject===subj; });
  var total = qs.length;
  var done = qs.filter(function(q){ return d.history[q.subject+'_'+q.num]; }).length;
  var title = isAll ? '全部科目混合练习' : isGroup ? GROUP_LABELS[subj]+' · '+total+' 题' : subj+' · '+total+' 题';
  document.getElementById('subj-sel-title').textContent = title;
  document.getElementById('range-row').style.display = 'none';
  document.getElementById('range-from').value = '';
  document.getElementById('range-to').value = '';
  var undone = total - done;
  var modes = [
    {id:'seq',         title:'顺序练习',       desc:'从第 1 题开始，按顺序练习全部 '+total+' 题'},
    {id:'cont',        title:'继续上次',        desc:'从第 '+(done+1)+' 题继续（已做 '+done+'/'+total+'）'},
    {id:'rand',        title:'随机混合（全部）',desc:'随机打乱顺序，科目交替出现，共 '+total+' 题'},
    {id:'rand_undone', title:'随机混合（未做）',desc:'仅练习未做的 '+undone+' 题，随机科目交替出现'},
    {id:'review',      title:'回顾已做题',      desc:'浏览已做的 '+done+' 题，显示你当时的选择'},
    {id:'range',       title:'指定范围',        desc:'自定义起止题号（按顺序）'},
  ];
  document.getElementById('mode-list').innerHTML = modes.map(function(m,i){
    return '<button class="mbt'+(i===0?' on':'')+'" id="mbt-'+m.id+'" onclick="selectMode(\''+m.id+'\')">'
      +'<div class="mbt-title">'+m.title+'</div>'
      +'<div class="mbt-desc">'+m.desc+'</div>'
    +'</button>';
  }).join('');
  document.getElementById('subj-sel').classList.add('on');
}
function closeSubjSel(){
  var el = document.getElementById('subj-sel');
  el.classList.remove('on');
  el.dataset.jc = '';
}
function selectMode(m){
  S.selMode = m;
  document.querySelectorAll('.mbt').forEach(function(b){ b.classList.remove('on'); });
  var el = document.getElementById('mbt-'+m);
  if(el) el.classList.add('on');
  document.getElementById('range-row').style.display = m==='range' ? 'flex' : 'none';
}
function startFromSel(){
  var subj = _pSubj;
  var mode = S.selMode||'seq';
  var isAll = subj==='all';
  var isGroup = GROUP_SETS[subj] != null;
  var d = getDb();
  var qs = isAll ? QUESTIONS.slice()
    : isGroup ? QUESTIONS.filter(function(q){ return GROUP_SETS[subj].indexOf(q.subject)>=0; })
    : QUESTIONS.filter(function(q){ return q.subject===subj; });
  if(mode==='seq'){
    qs.sort(function(a,b){ return a.subject===b.subject ? a.num-b.num : SUBJECTS.indexOf(a.subject)-SUBJECTS.indexOf(b.subject); });
    startQuiz(qs, subj, 0);
  } else if(mode==='cont'){
    qs.sort(function(a,b){ return a.subject===b.subject ? a.num-b.num : SUBJECTS.indexOf(a.subject)-SUBJECTS.indexOf(b.subject); });
    var first = qs.findIndex(function(q){ return !d.history[q.subject+'_'+q.num]; });
    startQuiz(qs, subj, Math.max(0, first));
  } else if(mode==='rand'){
    startQuiz(shuffleNoConsecutive(qs), subj, 0);
  } else if(mode==='rand_undone'){
    var undoneQs = qs.filter(function(q){ return !d.history[q.subject+'_'+q.num]; });
    if(!undoneQs.length){ showToast('该范围题目已全部做完！'); return; }
    startQuiz(shuffleNoConsecutive(undoneQs), subj, 0);
  } else if(mode==='review'){
    qs.sort(function(a,b){ return a.subject===b.subject ? a.num-b.num : SUBJECTS.indexOf(a.subject)-SUBJECTS.indexOf(b.subject); });
    var doneQs=qs.filter(function(q){ return d.history[q.subject+'_'+q.num]; });
    if(!doneQs.length){ showToast('暂无已做题目'); return; }
    startQuiz(doneQs, subj, 0, false, false, _buildPreAnswers(doneQs,'main',function(q){return q.subject+'_'+q.num;}));
  } else if(mode==='range'){
    qs.sort(function(a,b){ return a.num-b.num; });
    var from = parseInt(document.getElementById('range-from').value)||1;
    var to = parseInt(document.getElementById('range-to').value)||qs.length;
    var ranged = qs.filter(function(_,i){ return i+1>=from&&i+1<=to; });
    if(!ranged.length){ showToast('该范围内没有题目'); return; }
    startQuiz(ranged, subj, 0);
  }
  closeSubjSel();
}

// Quiz
function startQuiz(qs, subject, startIdx, isJc, isHw, preAnswers){
  if(!qs||!qs.length){ showToast('没有题目'); return; }
  S.quiz = { qs:qs, idx:startIdx||0, ans:preAnswers||{}, subject:subject, isJc:!!isJc, isHw:!!isHw };
  showView('quiz');
  renderQ();
}
// 从历史记录里为题目列表构造 preAnswers 对象
function _buildPreAnswers(qs, ns, keyFn){
  var d=getDb(ns), pre={};
  qs.forEach(function(q,i){
    var h=d.history[keyFn(q)];
    if(h && h.sel) pre[i]={sel:h.sel, ok:!!h.ok};
  });
  return pre;
}
function startWrongSubj(subj){
  var d = getDb();
  var wqs = QUESTIONS.filter(function(q){ var w=d.wrong[q.subject+'_'+q.num]; return q.subject===subj&&w&&w.on; });
  if(!wqs.length){ showToast('该科目暂无错题'); return; }
  startQuiz(wqs, subj, 0);
}
function renderQ(){
  var quiz = S.quiz;
  var q = quiz.qs[quiz.idx];
  var isJcQ = quiz.isJc || !!(q.id && q.id.indexOf('jc_')===0);
  var isHwQ = quiz.isHw || !!(q.id && q.id.indexOf('hw_')===0);
  var ns = isJcQ ? 'jc' : isHwQ ? 'hw' : 'main';
  var d = getDb(ns);
  var key = (isJcQ||isHwQ) ? q.id : q.subject+'_'+q.num;
  var isWrong = d.wrong[key]&&d.wrong[key].on;
  document.getElementById('q-tag').textContent = q.subject;
  document.getElementById('q-info').textContent = (quiz.idx+1)+'/'+quiz.qs.length;
  document.getElementById('q-pbar').style.width = ((quiz.idx+1)/quiz.qs.length*100)+'%';
  document.getElementById('jmp-in').value = '';
  document.getElementById('q-num').textContent = '['+q.subject+'] 第 '+q.num+' 题  (本次 '+(quiz.idx+1)+'/'+quiz.qs.length+')';
  document.getElementById('q-text').textContent = (q.question||'').replace(/\xa0/g,' ').trim();
  var letters = ['A','B','C'].filter(function(l){ return q.options&&q.options[l]; });
  var answered = quiz.ans[quiz.idx];
  document.getElementById('q-opts').innerHTML = letters.map(function(l){
    var cls = 'opt';
    if(answered){ if(l===q.answer) cls+=' ok'; else if(l===answered.sel) cls+=' ng'; }
    var dis = answered ? 'disabled' : '';
    return '<button class="'+cls+'" onclick="pick(\''+l+'\')" '+dis+'>'
      +'<span class="opt-l">'+l+'</span>'
      +'<span>'+esc(q.options[l])+'</span>'
    +'</button>';
  }).join('');
  document.getElementById('btn-next').textContent = quiz.idx===quiz.qs.length-1 ? '完成' : '下一题';
  var bw = document.getElementById('btn-wrong');
  if(answered){
    bw.style.display='';
    bw.textContent = isWrong ? '移出错题' : '加入错题';
    bw.className = 'btn '+(isWrong?'btn-s':'btn-a');
  } else { bw.style.display='none'; }
  if(answered) showExpl(q, answered.ok);
  else document.getElementById('q-expl').style.display='none';
}
function pick(l){
  var quiz = S.quiz;
  if(quiz.ans[quiz.idx]) return;
  var q = quiz.qs[quiz.idx];
  var ok = l===q.answer;
  quiz.ans[quiz.idx] = {sel:l, ok:ok};
  var isJcQ2 = quiz.isJc || !!(q.id && q.id.indexOf('jc_')===0);
  var isHwQ2 = quiz.isHw || !!(q.id && q.id.indexOf('hw_')===0);
  var ns = isJcQ2 ? 'jc' : isHwQ2 ? 'hw' : 'main';
  var d = getDb(ns);
  var key = (isJcQ2||isHwQ2) ? q.id : q.subject+'_'+q.num;
  d.history[key] = {ok:ok, sel:l, t:Date.now()};
  if(!ok){
    if(!d.wrong[key]) d.wrong[key]={subject:q.subject,num:q.num,id:q.id||null,cnt:0};
    d.wrong[key].on=true;
    d.wrong[key].cnt=(d.wrong[key].cnt||0)+1;
    d.wrong[key].t=Date.now();
  }
  saveDb(d, ns);
  renderQ();
}
function showExpl(q, ok){
  var box = document.getElementById('q-expl');
  var hd = document.getElementById('q-expl-hd');
  var bd = document.getElementById('q-expl-bd');
  box.style.display='block';
  hd.className='expl-hd '+(ok?'ok':'ng');
  hd.innerHTML = ok
    ? '&#10003; 回答正确！正确答案是 <strong>'+q.answer+'</strong>'
    : '&#10007; 回答错误。正确答案是 <strong>'+q.answer+'</strong>';
  bd.textContent = q.explanation||'（暂无解析）';
}
function prevQ(){ if(S.quiz.idx>0){ S.quiz.idx--; renderQ(); scrollTo(0,0); } }
function nextQ(){
  var quiz=S.quiz;
  if(quiz.idx<quiz.qs.length-1){ quiz.idx++; renderQ(); scrollTo(0,0); }
  else {
    var done=Object.keys(quiz.ans).length;
    var ok=Object.values(quiz.ans).filter(function(a){ return a.ok; }).length;
    showToast('练习结束！答对 '+ok+'/'+done+' 题，正确率 '+(done?Math.round(ok/done*100):0)+'%');
  }
}
function jumpQ(){
  var v=parseInt(document.getElementById('jmp-in').value);
  var qs=S.quiz.qs;
  var idx=qs.findIndex(function(q){ return q.num===v; });
  if(idx<0&&v>=1&&v<=qs.length) idx=v-1;
  if(idx>=0){ S.quiz.idx=idx; renderQ(); scrollTo(0,0); }
  else showToast('题号不存在');
}
function toggleWrong(){
  var q=S.quiz.qs[S.quiz.idx];
  var isJcQ3=S.quiz.isJc||!!(q.id&&q.id.indexOf('jc_')===0);
  var isHwQ3=S.quiz.isHw||!!(q.id&&q.id.indexOf('hw_')===0);
  var ns=isJcQ3?'jc':isHwQ3?'hw':'main';
  var key=(isJcQ3||isHwQ3)?q.id:q.subject+'_'+q.num;
  var d=getDb(ns);
  if(!d.wrong[key]) d.wrong[key]={subject:q.subject,num:q.num,id:q.id||null,cnt:0};
  d.wrong[key].on=!d.wrong[key].on;
  saveDb(d,ns);
  renderQ();
  showToast(d.wrong[key].on?'已加入错题库':'已移出错题库');
}

// Wrong book — 来源标识
var SRC_STYLE = {
  'PACK题':  {bg:'#ebf4ff', color:'#1a365d'},
  'JC百题':  {bg:'#fef3c7', color:'#92400e'},
  '课后题':  {bg:'#f0fff4', color:'#276749'}
};
function _collectWrong(){
  var dMain=getDb(), dJc=getDb('jc'), dHw=getDb('hw'), items=[];
  Object.entries(dMain.wrong).filter(function(e){return e[1].on;}).forEach(function(e){
    var key=e[0],w=e[1];
    var q=QUESTIONS.find(function(q){return q.subject===w.subject&&q.num===w.num;});
    if(q) items.push({key:key,w:w,q:q,src:'PACK题',ns:'main'});
  });
  Object.entries(dHw.wrong).filter(function(e){return e[1].on;}).forEach(function(e){
    var key=e[0],w=e[1];
    var q=HW_QUESTIONS.find(function(q){return q.id===key;});
    if(q) items.push({key:key,w:w,q:q,src:'课后题',ns:'hw'});
  });
  Object.entries(dJc.wrong).filter(function(e){return e[1].on;}).forEach(function(e){
    var key=e[0],w=e[1];
    var q=JC_QUESTIONS.find(function(q){return q.id===key;});
    if(q) items.push({key:key,w:w,q:q,src:'JC百题',ns:'jc'});
  });
  return items;
}
function renderWrong(){
  var items=_collectWrong();
  var srcList=['PACK题','JC百题','课后题'];
  // 来源行：只展示当前有数据的来源

// Utils
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// 混合洗牌：保证相邻两题不同科目，加权随机保持题目分布均匀
function shuffleNoConsecutive(qs){
  if(!qs||qs.length<=1) return qs.slice();
  var groups={}, subjList=[];
  qs.forEach(function(q){
    var s=q.subject||'';
    if(!groups[s]){groups[s]=[];subjList.push(s);}
    groups[s].push(q);
  });
  // 各科目内部先打乱
  subjList.forEach(function(s){
    var arr=groups[s];
    for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}
  });
  var result=[], lastS=null;
  while(result.length<qs.length){
    var avail=subjList.filter(function(s){return groups[s].length>0;});
    if(!avail.length) break;
    var cands=avail.filter(function(s){return s!==lastS;});
    if(!cands.length) cands=avail;
    // 按剩余数量加权随机，避免某科目被用尽后仍强选
    var total=cands.reduce(function(acc,s){return acc+groups[s].length;},0);
    var r=Math.floor(Math.random()*total), cum=0, picked=cands[cands.length-1];
    for(var ci=0;ci<cands.length;ci++){cum+=groups[cands[ci]].length;if(r<cum){picked=cands[ci];break;}}
    result.push(groups[picked].shift());
    lastS=picked;
  }
  return result;
}

// 直接开始课后题（供外部调用）
function startHwQuiz(mode, selMode){
  selMode = selMode || 'rand';
  var qs, label;
  var dHw = getDb('hw');
  if(mode==='all'){
    qs = HW_QUESTIONS.slice(); label = 'CFA课后题·全部';
  } else if(mode==='g1'){
    qs = HW_QUESTIONS.filter(function(q){return HW_GROUP.g1.indexOf(q.subject)>=0;}); label='课后题·G1';
  } else if(mode==='g2'){
    qs = HW_QUESTIONS.filter(function(q){return HW_GROUP.g2.indexOf(q.subject)>=0;}); label='课后题·G2';
  } else if(mode.indexOf('subj:')===0){
    var subj2=mode.slice(5);
    qs=HW_QUESTIONS.filter(function(q){return q.subject===subj2;}); label='课后题·'+subj2;
  } else { qs=[]; label='课后题'; }
  if(!qs.length){showToast('该分类暂无题目');return;}
  // 按 module+num 排序作为"顺序"
  var sorted=qs.slice().sort(function(a,b){return a.module<b.module?-1:a.module>b.module?1:a.num-b.num;});
  if(selMode==='seq'){
    startQuiz(sorted,label,0,false,true);
  } else if(selMode==='cont'){
    var first=sorted.findIndex(function(q){return !dHw.history[q.id];});
    startQuiz(sorted,label,Math.max(0,first),false,true);
  } else if(selMode==='rand'){
    startQuiz(shuffleNoConsecutive(qs),label,0,false,true);
  } else if(selMode==='rand_undone'){
    var undoneHw=qs.filter(function(q){return !dHw.history[q.id];});
    if(!undoneHw.length){showToast('该分类题目已全部做完！');return;}
    startQuiz(shuffleNoConsecutive(undoneHw),label,0,false,true);
  } else if(selMode==='review'){
    var doneHw=sorted.filter(function(q){return dHw.history[q.id];});
    if(!doneHw.length){showToast('暂无已做题目');return;}
    startQuiz(doneHw,label,0,false,true,_buildPreAnswers(doneHw,'hw',function(q){return q.id;}));
  }
}

function startHwWrongSubj(subj){

  }

  var html = JC_SUBJECTS.map(function(subj){
    var qs = JC_QUESTIONS.filter(function(q){ return q.subject===subj; });
    var done = qs.filter(function(q){ return d.history[q.id]; }).length;
    var ok = qs.filter(function(q){ var h=d.history[q.id]; return h&&h.ok; }).length;
    var wCount = qs.filter(function(q){ var w=d.wrong[q.id]; return w&&w.on; }).length;
    var pct = qs.length ? Math.round(done/qs.length*100) : 0;
    var acc = done ? Math.round(ok/done*100) : 0;
    var icon = JC_ICONS[subj]||'📝';
    var wBtn = wCount
      ? '<button class="sc-btn sc-btn-w" onclick="startJcWrongSubj(\''+subj+'\');event.stopPropagation()">错题('+wCount+')</button>'
      : '';
    return '<div class="sc">'
      +'<div class="sc-icon">'+icon+'</div>'
      +'<div class="sc-name">'+subj+'</div>'
      +'<div class="sc-meta">'
        +'<span>'+qs.length+' 题</span>'
        +'<span>已做 '+done+'</span>'
        +(done?'<span>正确率 '+acc+'%</span>':'')
        +(wCount?'<span style="color:var(--err)">错题 '+wCount+'</span>':'')
      +'</div>'
      +'<div class="pbar"><div class="pbar-fill" style="width:'+pct+'%"></div></div>'
      +'<div class="sc-btns">'
        +'<button class="sc-btn sc-btn-p" onclick="openJcSubjSel(\''+subj+'\');event.stopPropagation()">开始练习</button>'
        +wBtn
      +'</div>'
    +'</div>';
  }).join('');
  document.getElementById('jc-grid').innerHTML = html;
}

function startJcQuiz(mode, selMode){
  selMode = selMode || 'rand';
  var qs, label;
  var d = getDb('jc');
  if(mode==='all'){
    qs = (JC_QUESTIONS||[]).slice(); label='JC全部';
  } else if(JC_GROUP[mode]){
    qs = (JC_QUESTIONS||[]).filter(function(q){return JC_GROUP[mode].indexOf(q.subject)>=0;}); label='JC·'+JC_GROUP_LABELS[mode];
  } else if(mode==='wrong'){
    var wrongIds=Object.entries(d.wrong).filter(function(e){return e[1].on;}).map(function(e){return e[0];});
    qs=(JC_QUESTIONS||[]).filter(function(q){return wrongIds.indexOf(q.id)>=0;}); label='JC错题';
  } else if(mode.indexOf('subj:')===0){
    var subj=mode.slice(5);
    qs=(JC_QUESTIONS||[]).filter(function(q){return q.subject===subj;}); label='JC·'+subj;
  } else { qs=[]; label='JC'; }

  if(!qs||!qs.length){showToast('该分类暂无题目');return;}
  var sorted=qs.slice().sort(function(a,b){return a.subject===b.subject?a.num-b.num:JC_SUBJECTS.indexOf(a.subject)-JC_SUBJECTS.indexOf(b.subject);});
  if(selMode==='seq'){
    startQuiz(sorted,label,0,true);
  } else if(selMode==='cont'){
    var first=sorted.findIndex(function(q){return !d.history[q.id];});
    startQuiz(sorted,label,Math.max(0,first),true);
  } else if(selMode==='rand'){
    startQuiz(shuffleNoConsecutive(qs),label,0,true);
  } else if(selMode==='rand_undone'){
    var undone=qs.filter(function(q){return !d.history[q.id];});
    if(!undone.length){showToast('该分类题目已全部做完！');return;}
    startQuiz(shuffleNoConsecutive(undone),label,0,true);
  } else if(selMode==='review'){
    var doneJcQ=sorted.filter(function(q){return d.history[q.id];});
    if(!doneJcQ.length){showToast('暂无已做题目');return;}
    startQuiz(doneJcQ,label,0,true,false,_buildPreAnswers(doneJcQ,'jc',function(q){return q.id;}));
  } else {
    startQuiz(shuffleNoConsecutive(qs),label,0,true);
  }
}

function startJcWrongSubj(subj){

// Patch startFromSel to support HW / JC mix / JC subject
var _origStartFromSel = startFromSel;
startFromSel = function(){
  var sel = document.getElementById('subj-sel');
  var mode = S.selMode||'seq';

  // ── HW 课后题 ──
  if(sel.dataset.hw === '1'){
    sel.dataset.hw='';
    startHwQuiz(_hwSelMode, mode);
    closeSubjSel();
    return;
  }

  // ── JC 混合（all/g1/g2） ──
  if(sel.dataset.jcmix === '1'){
    sel.dataset.jcmix='';
    startJcQuiz(_jcMixMode, mode);
    closeSubjSel();
    return;
  }

  // ── JC 科目级 ──
  if(sel.dataset.jc === '1' && _jcSubj){
    sel.dataset.jc='';
    var subj=_jcSubj;
    var dJc=getDb('jc');
    var qs=(JC_QUESTIONS||[]).filter(function(q){return q.subject===subj;});
    qs=qs.slice().sort(function(a,b){return a.num-b.num;});
    if(mode==='seq'){
      startQuiz(qs,'JC·'+subj,0,true);
    } else if(mode==='cont'){
      var first=qs.findIndex(function(q){return !dJc.history[q.id];});
      startQuiz(qs,'JC·'+subj,Math.max(0,first),true);
    } else if(mode==='rand'){
      startQuiz(shuffleNoConsecutive(qs),'JC·'+subj,0,true);
    } else if(mode==='rand_undone'){
      var undoneJcS=qs.filter(function(q){return !dJc.history[q.id];});
      if(!undoneJcS.length){showToast('该科目题目已全部做完！');return;}
      startQuiz(shuffleNoConsecutive(undoneJcS),'JC·'+subj,0,true);
    } else if(mode==='review'){
      var doneJcS=qs.filter(function(q){return dJc.history[q.id];});
      if(!doneJcS.length){showToast('暂无已做题目');return;}
      startQuiz(doneJcS,'JC·'+subj,0,true,false,_buildPreAnswers(doneJcS,'jc',function(q){return q.id;}));
    } else if(mode==='range'){
      var from=parseInt(document.getElementById('range-from').value)||1;
      var to=parseInt(document.getElementById('range-to').value)||qs.length;
      var ranged=qs.filter(function(_,i){return i+1>=from&&i+1<=to;});
      if(!ranged.length){showToast('该范围内没有题目');return;}
      startQuiz(ranged,'JC·'+subj,0,true);
    }
    closeSubjSel();
    return;
  }

  _origStartFromSel();
};

// ── 数据备份与迁移 ──────────────────────────────────────
function showDataModal(){ document.getElementById('data-modal').classList.add('on'); }
function hideDataModal(){ document.getElementById('data-modal').classList.remove('on'); }

function exportDataJson(){
  var payload = {};
  [['main', DB_KEY], ['jc', JC_DB_KEY], ['hw', HW_DB_KEY]].forEach(function(pair){
    var ns = pair[0], k = pair[1];
    try{ payload[k] = JSON.parse(localStorage.getItem(k)||'{}'); }catch(e){ payload[k]={}; }
  });
  var blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cfa_quiz_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  showToast('备份已下载');
}

function triggerImport(){
  document.getElementById('import-file-input').value = '';
  document.getElementById('import-file-input').click();
}

function importDataJson(input){
  var file = input.files[0];
  if(!file){ return; }
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var payload = JSON.parse(e.target.result);
      var imported = 0;
      [['main', DB_KEY], ['jc', JC_DB_KEY], ['hw', HW_DB_KEY]].forEach(function(pair){
        var ns = pair[0], k = pair[1];
        var incoming = payload[k];
        if(!incoming) return;
        var existing = getDb(ns);
        var merged = _mergeDb(existing, incoming);
        saveDb(merged, ns, true);
        imported += Object.keys(merged.history||{}).length;
      });
      pushSync();
      hideDataModal();
      renderHome();
      showToast('导入成功，共 ' + imported + ' 条记录，已同步云端');
    } catch(err){
      showToast('文件格式错误：' + err.message);
    }
  };
  reader.readAsText(file);
}

function forcePushSync(){
  if(!_fbDb){ showToast('云端未连接，请检查网络'); return; }
  _setSyncDot('syncing','同步中…');
  _fbDb.ref(FB_PATH).once('value')
    .then(function(snap){
      var cloud = snap.val() || {};
      var merged = {};
      ['main','jc','hw'].forEach(function(ns){
        var ck = ns==='jc' ? JC_DB_KEY : ns==='hw' ? HW_DB_KEY : DB_KEY;
        merged[ck] = _mergeDb(getDb(ns), cloud[ck] || {});
        saveDb(merged[ck], ns, true);
      });
      return _fbDb.ref(FB_PATH).set(JSON.parse(JSON.stringify(merged)));
    })
    .then(function(){ _setSyncDot('synced','✓ 已同步'); hideDataModal(); showToast('已上传到云端'); })
    .catch(function(err){ _setSyncDot('err','⚠ 同步失败'); showToast('上传失败：' + err.message); });
}

function cleanIncompleteHistory(){
  var total = 0;
  ['main','jc','hw'].forEach(function(ns){
    var d = getDb(ns);
    var cleaned = {};
    Object.keys(d.history).forEach(function(k){
      var h = d.history[k];
      if(h && h.sel) cleaned[k] = h;
      else total++;
    });
    d.history = cleaned;
    saveDb(d, ns);
  });
  hideDataModal();
  if(total === 0){
    showToast('没有需要清理的记录');
  } else {
    showToast('已清理 '+total+' 条无答案记录，重置为未做');
    renderHome();
    if(S.view==='stats') renderStats();
    else if(S.view==='jc') renderJc();
    else if(S.view==='hw') renderHw();
    else if(S.view==='wrong') renderWrong();
  }
}

function forcePullSync(){
  if(!_fbDb){ showToast('云端未连接，请检查网络'); return; }
  _setSyncDot('syncing','同步中…');
  pullSync(function(ok){
    if(ok){
      _setSyncDot('synced','✓ 已同步');
      hideDataModal();
      renderHome();
      showToast('已从云端拉取最新数据');
    } else {
      _setSyncDot('err','⚠ 同步失败');
      showToast('拉取失败，请检查网络');
    }
  });
}

function _setSyncDot(cls, text){
  var el = document.getElementById('sync-dot');
  if(!el) return;
  el.className = 'sync-dot show ' + cls;
  el.textContent = text;
}

function _mergeDb(local, remote){
  var m = {
    history: Object.assign({}, remote.history || {}),
    wrong:   Object.assign({}, remote.wrong   || {})
  };
  Object.keys(local.history || {}).forEach(function(k){
    var lv=local.history[k]||{}, rv=m.history[k]||{};
    // 优先保留更新的那条（时间戳较大），同时兼容 ok/sel/t 和旧 times/correct 两种格式
    var useLocal = +(lv.t||0) >= +(rv.t||0);
    m.history[k]={
      ok:      useLocal ? lv.ok      : (rv.ok      != null ? rv.ok      : lv.ok),
      sel:     useLocal ? lv.sel     : (rv.sel      || lv.sel),
      t:       Math.max(+(lv.t||0),       +(rv.t||0)),
      times:   Math.max(+(lv.times||0),   +(rv.times||0)),
      correct: Math.max(+(lv.correct||0), +(rv.correct||0))
    };
  });
  Object.keys(local.wrong || {}).forEach(function(k){
    var lv=local.wrong[k]||{}, rv=m.wrong[k]||{};
    m.wrong[k]=Object.assign({},rv,lv,{
      cnt: Math.max(+(lv.cnt||0), +(rv.cnt||0)),
      on:  !!(lv.on||rv.on)
    });
  });
  return m;
}

function pullSync(cb){
  if(!_fbDb){ cb&&cb(false); return; }
  _fbDb.ref(FB_PATH).once('value')
    .then(function(snap){
      var cloud = snap.val() || {};
      ['main','jc','hw'].forEach(function(ns){
        var ck = ns==='jc' ? JC_DB_KEY : ns==='hw' ? HW_DB_KEY : DB_KEY;
        if(cloud[ck]) saveDb(_mergeDb(getDb(ns), cloud[ck]), ns, true);
      });
      cb&&cb(true);
    })
    .catch(function(){ cb&&cb(false); });
}

function pushSync(){
  if(!_fbDb) return;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(function(){
    _setSyncDot('syncing','同步中…');
    // 读取云端 → 合并 → 写回（防止多设备覆盖）
    _fbDb.ref(FB_PATH).once('value')
      .then(function(snap){
        var cloud = snap.val() || {};
        var merged = {};
        ['main','jc','hw'].forEach(function(ns){
          var ck = ns==='jc' ? JC_DB_KEY : ns==='hw' ? HW_DB_KEY : DB_KEY;
          merged[ck] = _mergeDb(getDb(ns), cloud[ck] || {});
          saveDb(merged[ck], ns, true);
        });
        return _fbDb.ref(FB_PATH).set(JSON.parse(JSON.stringify(merged)));
      })
      .then(function(){ _setSyncDot('synced','✓ 已同步'); })
      .catch(function(){ _setSyncDot('err','⚠ 同步失败'); });
  }, 1200);
}
